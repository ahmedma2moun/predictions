name: Android — Debug APK → Firebase

on:
  workflow_dispatch:

jobs:
  build-and-distribute:
    name: Gradle Build → Firebase Distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install JS dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Expo prebuild (Android)
        working-directory: mobile
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Write local.properties
        working-directory: mobile/android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Bundle JS for Android
        working-directory: mobile
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Distribute via Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: "1:324923947200:android:9453983ba1902076c5d525"
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: "Build from ${{ github.sha }} — ${{ github.event.head_commit.message }}"
