name: iOS Auto-Publish

on:
  workflow_dispatch:

jobs:
  build-and-distribute:
    name: EAS Build → Firebase Distribution (iOS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build IPA via EAS
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          BUILD_JSON=$(eas build \
            --profile preview \
            --platform ios \
            --non-interactive \
            --json 2>/dev/null)
          IPA_URL=$(echo "$BUILD_JSON" | jq -r '.[0].artifacts.buildUrl')
          echo "IPA_URL=$IPA_URL" >> $GITHUB_ENV

      - name: Download IPA
        run: curl -L "$IPA_URL" -o app-preview.ipa

      - name: Distribute via Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: "1:324923947200:ios:e7b86d3c43a3f633c5d525"
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: app-preview.ipa
          releaseNotes: "Auto-build from commit ${{ github.sha }} — ${{ github.event.head_commit.message }}"
