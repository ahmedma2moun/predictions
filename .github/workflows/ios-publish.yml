name: iOS Auto-Publish

on:
  workflow_dispatch:

jobs:
  build-and-distribute:
    name: EAS Build → TestFlight (iOS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build IPA via EAS
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          BUILD_JSON=$(eas build \
            --profile testflight \
            --platform ios \
            --non-interactive \
            --json 2>/dev/null)
          BUILD_ID=$(echo "$BUILD_JSON" | jq -r '.[0].id')
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_ENV

      - name: Submit to TestFlight via EAS
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "${{ secrets.ASC_API_KEY_CONTENT }}" > /tmp/AuthKey.p8
          eas submit \
            --platform ios \
            --profile testflight \
            --id "$BUILD_ID" \
            --apple-api-key /tmp/AuthKey.p8 \
            --apple-api-key-id "${{ secrets.ASC_API_KEY_ID }}" \
            --apple-api-issuer-id "${{ secrets.ASC_API_KEY_ISSUER_ID }}" \
            --asc-app-id "${{ secrets.ASC_APP_ID }}" \
            --non-interactive
          rm -f /tmp/AuthKey.p8
