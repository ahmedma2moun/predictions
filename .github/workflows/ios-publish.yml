name: iOS — Archive → TestFlight

on:
  workflow_dispatch:

jobs:
  build-and-distribute:
    name: Xcode Build → TestFlight
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install JS dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Expo prebuild (iOS)
        working-directory: mobile
        run: npx expo prebuild --platform ios --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Patch Podfile — disable code signing for Pod targets
        run: |
          python3 - <<'EOF'
          import re, sys

          path = 'mobile/ios/Podfile'
          with open(path, 'r') as f:
              content = f.read()

          patch = """
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
              end
            end
          """

          if 'CODE_SIGNING_ALLOWED' in content:
              print('Podfile already patched, skipping.')
              sys.exit(0)

          if 'react_native_post_install(' not in content:
              print('ERROR: expected anchor not found in Podfile', file=sys.stderr)
              sys.exit(1)

          content = content.replace(
              'react_native_post_install(',
              patch + '    react_native_post_install(',
              1
          )
          with open(path, 'w') as f:
              f.write(content)
          print('Podfile patched successfully.')
          EOF

      - name: Install CocoaPods
        working-directory: mobile/ios
        run: pod install

      - name: Import distribution certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH

          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -k $KEYCHAIN_PATH \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH

      - name: Set up App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          KEY_FILE="$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

          if printf '%s' "$ASC_KEY_CONTENT" | grep -q "BEGIN PRIVATE KEY"; then
            # Raw PEM — convert any literal "\n" escape sequences to real newlines.
            printf '%b' "$ASC_KEY_CONTENT" > "$KEY_FILE"
          else
            # No PEM header — assume the secret is a base64-encoded .p8 file.
            printf '%s' "$ASC_KEY_CONTENT" | base64 --decode > "$KEY_FILE"
          fi

          # Fail early (without printing the key) if it is not a parseable PKCS#8 key.
          if ! openssl pkey -in "$KEY_FILE" -noout 2>/dev/null; then
            echo "::error::ASC_API_KEY_CONTENT is not a valid .p8 private key after decoding."
            exit 1
          fi

          echo "ASC_KEY_PATH=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Configure app target signing (automatic)
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          gem install xcodeproj --no-document
          ruby - <<'EOF'
          require 'xcodeproj'

          project_path = 'mobile/ios/FootballPredictions.xcodeproj'
          target_name  = 'FootballPredictions'
          team_id      = ENV['TEAM_ID']

          project = Xcodeproj::Project.open(project_path)
          target  = project.targets.find { |t| t.name == target_name }
          raise "Target #{target_name} not found" unless target

          # Automatic signing: Xcode generates/downloads a matching distribution
          # profile for the certificate present in the keychain via the ASC API key.
          target.build_configurations.each do |config|
            config.build_settings['CODE_SIGN_STYLE'] = 'Automatic'
            config.build_settings['DEVELOPMENT_TEAM'] = team_id
            config.build_settings.delete('PROVISIONING_PROFILE_SPECIFIER')
            config.build_settings.delete('PROVISIONING_PROFILE')
            config.build_settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
            config.build_settings['CODE_SIGN_IDENTITY[sdk=iphoneos*]'] = 'Apple Distribution'
          end

          # Mirror automatic style + team in the project attributes block.
          attrs = project.root_object.attributes
          attrs['TargetAttributes'] ||= {}
          attrs['TargetAttributes'][target.uuid] ||= {}
          attrs['TargetAttributes'][target.uuid]['ProvisioningStyle'] = 'Automatic'
          attrs['TargetAttributes'][target.uuid]['DevelopmentTeam'] = team_id

          project.save
          puts "Automatic signing configured on target #{target_name}."
          EOF

      - name: Write ExportOptions.plist
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>uploadSymbols</key>
              <true/>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF

      - name: Archive
        env:
          ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace mobile/ios/FootballPredictions.xcworkspace \
            -scheme FootballPredictions \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/FootballPredictions.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Export IPA
        env:
          ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/FootballPredictions.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/FootballPredictions.ipa \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
