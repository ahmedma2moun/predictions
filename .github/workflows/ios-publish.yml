name: iOS — Archive → TestFlight

on:
  workflow_dispatch:

jobs:
  build-and-distribute:
    name: Xcode Build → TestFlight
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install JS dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Expo prebuild (iOS)
        working-directory: mobile
        run: npx expo prebuild --platform ios --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Patch Podfile — disable code signing for Pod targets
        run: |
          python3 - <<'EOF'
          import re, sys

          path = 'mobile/ios/Podfile'
          with open(path, 'r') as f:
              content = f.read()

          patch = """
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
              end
            end
          """

          if 'CODE_SIGNING_ALLOWED' in content:
              print('Podfile already patched, skipping.')
              sys.exit(0)

          if 'react_native_post_install(' not in content:
              print('ERROR: expected anchor not found in Podfile', file=sys.stderr)
              sys.exit(1)

          content = content.replace(
              'react_native_post_install(',
              patch + '    react_native_post_install(',
              1
          )
          with open(path, 'w') as f:
              f.write(content)
          print('Podfile patched successfully.')
          EOF

      - name: Install CocoaPods
        working-directory: mobile/ios
        run: pod install

      - name: Import distribution certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH

          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -k $KEYCHAIN_PATH \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i $PP_PATH | plutil -extract UUID xml1 - -o - | xmllint --xpath '//string/text()' -)
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Configure app target signing
        env:
          PROFILE_NAME: ${{ secrets.IOS_PROFILE_NAME }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          gem install xcodeproj --no-document
          ruby - <<'EOF'
          require 'xcodeproj'

          project_path = 'mobile/ios/FootballPredictions.xcodeproj'
          target_name  = 'FootballPredictions'
          profile_name = ENV['PROFILE_NAME']
          team_id      = ENV['TEAM_ID']

          project = Xcodeproj::Project.open(project_path)
          target  = project.targets.find { |t| t.name == target_name }
          raise "Target #{target_name} not found" unless target

          target.build_configurations.each do |config|
            config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
            config.build_settings['DEVELOPMENT_TEAM'] = team_id
            config.build_settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
            config.build_settings['CODE_SIGN_IDENTITY[sdk=iphoneos*]'] = 'Apple Distribution'
            config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = profile_name
          end

          project.save
          puts "Signing configured on target #{target_name}."
          EOF

      - name: Write ExportOptions.plist
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>uploadSymbols</key>
              <true/>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.maamoun.footballpredictions</key>
                  <string>${{ secrets.IOS_PROFILE_NAME }}</string>
              </dict>
          </dict>
          </plist>
          EOF

      - name: Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace mobile/ios/FootballPredictions.xcworkspace \
            -scheme FootballPredictions \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/FootballPredictions.xcarchive \
            -destination "generic/platform=iOS"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/FootballPredictions.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_CONTENT" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/FootballPredictions.ipa \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

          rm -f ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
