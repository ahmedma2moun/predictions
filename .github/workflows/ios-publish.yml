name: iOS Auto-Publish

on:
  workflow_dispatch:

jobs:
  build-and-distribute:
    name: EAS Build → TestFlight (iOS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build IPA via EAS
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --profile testflight \
            --platform ios \
            --non-interactive \
            --json \
            --no-wait > /tmp/eas-build.json
          cat /tmp/eas-build.json
          BUILD_ID=$(jq -r '.[0].id // .id' /tmp/eas-build.json)
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_ENV
          echo "Build queued: $BUILD_ID"

      - name: Submit to TestFlight via EAS
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
        run: |
          echo "${{ secrets.ASC_API_KEY_CONTENT }}" > /tmp/AuthKey.p8
          eas submit \
            --platform ios \
            --profile testflight \
            --id "$BUILD_ID" \
            --non-interactive
          rm -f /tmp/AuthKey.p8
