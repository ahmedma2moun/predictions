<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Preds — Modern UI redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"/>
<style>
  html, body {
    margin: 0; padding: 0; background: #06070B;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #F2F5FA;
  }
  * { box-sizing: border-box; }

  /* live pulse */
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(255,77,109,0.6); }
    100% { box-shadow: 0 0 0 10px rgba(255,77,109,0);   }
  }

  /* device frame styling — applied via class so design_canvas resizes nicely */
  .device {
    width: 390px; height: 844px;
    border-radius: 44px;
    border: 1px solid rgba(255,255,255,0.10);
    background: #07090E;
    overflow: hidden;
    position: relative;
    box-shadow:
      inset 0 0 0 6px #0c0e14,
      0 30px 60px -20px rgba(0,0,0,0.5);
  }
  .device .notch {
    position: absolute; top: 11px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 34px;
    border-radius: 20px; background: #000;
    z-index: 50;
  }
  .device .home-indicator {
    position: absolute; bottom: 8px; left: 50%;
    transform: translateX(-50%);
    width: 138px; height: 5px; border-radius: 99px;
    background: rgba(255,255,255,0.55);
    z-index: 70; pointer-events: none;
  }

  /* tiny code styling for handoff sheet */
  code {
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
    font-size: 11px;
    padding: 1px 5px;
    background: rgba(255,255,255,0.05);
    border-radius: 4px;
    color: #10E089;
  }
</style>
</head>
<body>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
        integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
        crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
        integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
        crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
        integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
        crossorigin="anonymous"></script>

<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="screens-matches.jsx"></script>
<script type="text/babel" src="screens-rest.jsx"></script>
<script type="text/babel" src="handoff.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
